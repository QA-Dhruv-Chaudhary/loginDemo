name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Select Test Tag"
        required: true
        type: choice
        options: [all, smoke, regression]

      browser:
        description: "Select Browser"
        required: true
        type: choice
        options: [all, chromium, firefox, webkit]

      email:
        description: "Enter recipient email (optional)"
        required: false
        type: string

      file:
        description: "Run specific file (optional)"
        required: false
        type: string

      folder:
        description: "Run specific folder (optional)"
        required: false
        type: string

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        id: run_tests
        run: |
          echo "🚀 Starting Playwright execution..."

          CMD="npx playwright test"

          if [ "${{ github.event.inputs.tag }}" != "all" ]; then
            CMD="$CMD --grep @${{ github.event.inputs.tag }}"
          fi

          if [ -n "${{ github.event.inputs.file }}" ]; then
            CMD="$CMD ${{ github.event.inputs.file }}"
          fi

          if [ -n "${{ github.event.inputs.folder }}" ]; then
            CMD="$CMD ${{ github.event.inputs.folder }}"
          fi

          if [ "${{ github.event.inputs.browser }}" != "all" ]; then
            CMD="$CMD --project=${{ github.event.inputs.browser }}"
          fi

          echo "👉 Executing: $CMD"
          eval $CMD

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Prepare Email Attachment
        if: ${{ always() && github.event.inputs.email != '' }}
        run: |
          if [ -f "playwright-report/index.html" ]; then
            cp "playwright-report/index.html" "playwright-report/GitAction-Testo.html"
          fi

      - name: Send Email Report
        if: ${{ always() && github.event.inputs.email != '' }}
        uses: dawidd6/action-send-mail@v3
        env:
          EMAIL_USER: ${{ secrets.PERSONAL_EMAIL }}
          EMAIL_PASS: ${{ secrets.PERSONAL_PASSWORD }}
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.EMAIL_USER }}
          password: ${{ env.EMAIL_PASS }}

          subject: |
            ${{ job.status == 'success' && '✅ Playwright Tests Passed' || '❌ Playwright Tests Failed' }}

          to: ${{ github.event.inputs.email }}
          from: ${{ env.EMAIL_USER }}

          body: |
            🚀 Playwright Test Execution Report

            ──────────────────────────────
            📌 Build Details
            ──────────────────────────────
            🔹 Status       : ${{ job.status }}
            🔹 Tag          : ${{ github.event.inputs.tag }}
            🔹 Browser      : ${{ github.event.inputs.browser }}
            🔹 Sent Using   : GitHub Actions

            ──────────────────────────────
            📊 Execution Summary
            ──────────────────────────────
            ${{ job.status == 'success' && '✅ All test cases passed successfully.' || '❌ Some test cases failed. Please check the report.' }}

            ──────────────────────────────
            🙌 Thanks,
            QA Automation Team

          attachments: playwright-report/GitAction-Testo.html